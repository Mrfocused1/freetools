services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Used by the synchronous PDF-edit endpoints to call the worker over
      # the internal docker network (no public exposure needed).
      - WORKER_URL=http://worker:8000
      # Used by /api/ask (research UI) to call the research-agent.
      - RESEARCH_AGENT_URL=http://research-agent:8000
      - RESEARCH_TOKEN=${RESEARCH_TOKEN}
      # Used by /api/font-clone/identify to call the font-worker.
      - FONT_WORKER_URL=http://font-worker:8000
      - FONT_TOKEN=${FONT_TOKEN}
    depends_on:
      - redis
      - worker
    networks:
      - quickfix

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # Bind to all interfaces but firewall-lock 6379 so only the vast.ai IP
    # can reach it. The web container hits Redis via the "quickfix" network
    # using the "redis" hostname — no public exposure needed for web <-> redis.
    ports:
      - "0.0.0.0:6379:6379"
    networks:
      - quickfix

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - quickfix

  worker:
    build:
      context: apps/worker
      dockerfile: Dockerfile.cpu
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DEVICE=cpu
      - WORKER_ID=hetzner-cpu-1
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      # Ask PyTorch to use all cores aggressively.
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    depends_on:
      - redis
    networks:
      - quickfix

  # ---- Research stack (Gemma 4 + browsing) ---------------------------
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://searxng:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - INSTANCE_NAME=quickfix-research
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - quickfix
    # No public ports — internal-only.

  research-agent:
    build:
      context: apps/research-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SEARXNG_URL=http://searxng:8888
      - RESEARCH_TOKEN=${RESEARCH_TOKEN}
      # Default LLM upstream (OpenRouter free Gemma 4). Customers don't
      # provide credentials — the server uses its own key for every request.
      - LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-oss-120b:free}
      - APP_URL=${APP_URL:-https://coachpixel.com}
    depends_on:
      - searxng
    networks:
      - quickfix
    # Exposed only via Caddy on /api/research with bearer auth.

  # ---- Font Identifier worker (Phase 1: CLIP-based identification) ----------
  font-worker:
    build:
      context: apps/font-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FONT_TOKEN=${FONT_TOKEN}
      # HuggingFace model cache — persists the CLIP model across container rebuilds
      - HF_HOME=/hf_cache
    volumes:
      # Font index (font_index.npz + font_index.json) — populate by running:
      #   docker compose run --rm font-worker python build_index.py
      - ./font-data:/data
      # CLIP model cache (~600 MB) — avoids re-downloading on every rebuild
      - font_hf_cache:/hf_cache
    # Internal-only; Caddy routes /api/font-clone/* here.
    networks:
      - quickfix

networks:
  quickfix:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  # HuggingFace model weights cache for the font-worker
  font_hf_cache:
